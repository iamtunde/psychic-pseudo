name: Move Issue on Branch Creation

on:
  create:

jobs:
  update_project_status:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Extract Issue Number
        id: parse_issue
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          if [[ $BRANCH_NAME =~ [^0-9]*([0-9]+) ]]; then
            echo "issue_number=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "Found issue number: ${BASH_REMATCH[1]}"
          else
            echo "No issue number found in branch name."
            exit 0
          fi

      - name: Move Issue to In Progress
        if: steps.parse_issue.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          BRANCH_AUTHOR: ${{ github.actor }}
        run: |
          # 1. Setup variables (UPDATE THESE THREE VALUES)
          PROJECT_NUMBER="1" 
          OWNER="iamtunde"
          ISSUE_NUMBER="${{ steps.parse_issue.outputs.issue_number }}"
          ISSUE_URL="https://github.com/${{ github.repository }}/issues/$ISSUE_NUMBER"
          
          echo "Working branch created by: $BRANCH_AUTHOR"
          
          echo "Fetching global Project ID..."
          PROJECT_ID=$(gh project view "$PROJECT_NUMBER" --owner "$OWNER" --format json --jq '.id')
          
          echo "Fetching project field options..."
          STATUS_DATA=$(gh project field-list $PROJECT_NUMBER --owner $OWNER --format json | jq -r '.fields[] | select(.name=="Status")')
          STATUS_FIELD_ID=$(echo "$STATUS_DATA" | jq -r '.id') 
          
          # Matches "In Progress" regardless of uppercase/lowercase text mapping
          OPTION_ID=$(echo "$STATUS_DATA" | jq -r '.options[] | select(.name | ascii_downcase == "in progress") | .id')
          
          echo "Adding/Finding issue on project board..."
          ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" --owner "$OWNER" --url "$ISSUE_URL" --format json --jq '.id')
          
          echo "Moving project item $ITEM_ID to 'In progress'..."
          gh project item-edit \
            --id "$ITEM_ID" \
            --project-id "$PROJECT_ID" \
            --field-id "$STATUS_FIELD_ID" \
            --single-select-option-id "$OPTION_ID" || echo "Issue is already 'In progress' or no changes were required."
          
          echo "Assigning issue #$ISSUE_NUMBER to $BRANCH_AUTHOR..."
          # Optional: Automatically assigns the issue to the person who created the branch
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-assignee "$BRANCH_AUTHOR"
          
