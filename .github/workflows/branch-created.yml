name: Move Issue on Branch Creation

on:
  create:

jobs:
  update_project_status:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Extract Issue Number
        id: parse_issue
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          if [[ $BRANCH_NAME =~ [^0-9]*([0-9]+) ]]; then
            echo "issue_number=${BRANCH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "Found issue number: ${BRANCH_REMATCH[1]}"
          else
            echo "No issue number found in branch name."
            exit 0
          fi

      - name: Move Issue to In Progress
        if: steps.parse_issue.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          # 1. Setup variables (UPDATE THESE THREE VALUES)
          PROJECT_NUMBER="1"                  # The integer number from your project URL
          OWNER="iamtunde" # Your username or organization name
          ISSUE_URL="https://github.com/${{ github.repository }}/issues/${{ steps.parse_issue.outputs.issue_number }}"
          
          echo "Adding/Finding issue on project board..."
          # This command returns the correct 'Project Item ID' instead of the Issue ID
          ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" --owner "$OWNER" --url "$ISSUE_URL" --json id --jq '.id')
          
          echo "Moving project item $ITEM_ID to 'In progress'..."
          # Double check if your board uses "In progress" or "In Progress" (case-sensitive)
          gh project item-edit "$PROJECT_NUMBER" --owner "$OWNER" --id "$ITEM_ID" --field "Status" --value "In progress"
